<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <link rel="icon" href="data:,">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header .badge {
      display: inline-block;
      background: rgba(99,179,237,0.15);
      border: 1px solid rgba(99,179,237,0.3);
      color: #63b3ed;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }
    .header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .header h1 span { color: #63b3ed; }
    .header p { color: rgba(255,255,255,0.45); font-size: 0.9rem; }

    /* STUDENT CARD */
    .student-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .student-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #63b3ed, #9f7aea);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .student-info { flex: 1; }
    .student-name { color: #fff; font-weight: 600; font-size: 0.95rem; }
    .student-id { color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-top: 2px; }
    .student-tag {
      background: rgba(99,179,237,0.15);
      color: #63b3ed;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* INPUT CARD */
    .input-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .input-label {
      color: rgba(255,255,255,0.6);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    .input-row input {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 16px;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input::placeholder { color: rgba(255,255,255,0.25); }
    .input-row input:focus { border-color: #63b3ed; }
    .btn-add {
      background: linear-gradient(135deg, #63b3ed, #9f7aea);
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-add:active { transform: scale(0.97); }
    .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

    /* STATS */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
    }
    .stat-number { font-size: 1.6rem; font-weight: 700; color: #fff; }
    .stat-label { color: rgba(255,255,255,0.35); font-size: 0.75rem; margin-top: 2px; }

    /* LIST */
    .list-header {
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding: 0 4px;
    }

    .items-list { display: flex; flex-direction: column; gap: 8px; }

    .item-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.15s, transform 0.15s;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .item-card:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(3px);
    }
    .item-num {
      width: 28px;
      height: 28px;
      background: rgba(99,179,237,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #63b3ed;
      font-size: 0.75rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    .item-text { flex: 1; color: #e2e8f0; font-size: 0.95rem; }
    .item-date { color: rgba(255,255,255,0.25); font-size: 0.72rem; margin-right: 8px; }
    .btn-del {
      background: rgba(245,101,101,0.12);
      border: 1px solid rgba(245,101,101,0.2);
      color: #fc8181;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .btn-del:hover { background: rgba(245,101,101,0.25); }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 50px 20px;
      color: rgba(255,255,255,0.25);
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty p { font-size: 0.9rem; }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.3);
      font-size: 0.9rem;
    }

    /* ERROR */
    .error-msg {
      background: rgba(245,101,101,0.1);
      border: 1px solid rgba(245,101,101,0.2);
      color: #fc8181;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2d3748;
      color: #fff;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="badge">✦ DevOps Lab • DigitalOcean</div>
      <h1>Task <span>Manager</span></h1>
      <p>Full-Stack · Flask + PostgreSQL · Docker + Nginx</p>
    </div>

    <div class="student-card">
      <div class="student-avatar">👩‍💻</div>
      <div class="student-info">
        <div class="student-name">Aiana Kutmanova</div>
        <div class="student-id">Student ID: 230104027</div>
      </div>
      <div class="student-tag">Student</div>
    </div>

    <div class="input-card">
      <div class="input-label">Новая задача</div>
      <div class="input-row">
        <input type="text" id="newItem" placeholder="Введите задачу и нажмите Enter..." onkeydown="if(event.key==='Enter') addItem()" />
        <button class="btn-add" id="addBtn" onclick="addItem()">+ Добавить</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="totalCount">—</div>
        <div class="stat-label">Всего задач</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:#68d391">✓</div>
        <div class="stat-label">PostgreSQL</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:#63b3ed">🐳</div>
        <div class="stat-label">Docker</div>
      </div>
    </div>

    <div id="error" style="display:none" class="error-msg"></div>

    <div class="list-header">Список задач</div>
    <div class="items-list" id="list">
      <div class="loading">Загрузка...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
